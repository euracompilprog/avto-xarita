<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eura Compil - Hamkorlar Xaritasi</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .popup-content h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .popup-content p {
            margin: 5px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // O'zbekiston markaziga xaritani sozlash
        const map = L.map('map').setView([41.0000, 68.0000], 6);

        // Ochiq xarita qatlamini qo'shish (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Obsidiandagi fayllaringizning aniq nomlari (Katta harflarda)
        const files = [
            'NAMANGAN MASHAD MOYKA.md',
            'QASHQADARYO DILLER.md',
            'TOSHKENT 7030.md',
            'XORAZM DILLER.md'
        ];

        // Markdown ichidagi YAML xususiyatlarini (Frontmatter) o'quvchi funksiya
        function parseMarkdown(text) {
            const yamlRegex = /^---\r?\n([\s\S]*?)\r?\n---/;
            const match = text.match(yamlRegex);
            if (!match) return null;

            const yamlLines = match[1].split('\n');
            const result = {};
            yamlLines.forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const key = parts[0].trim();
                    const value = parts.slice(1).join(':').trim();
                    result[key] = value;
                }
            });
            return result;
        }

        // Har bir faylni internetdan o'qib xaritaga qo'shish
        files.forEach(file => {
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Fayl topilmadi: " + file);
                    }
                    return response.text();
                })
                .then(text => {
                    const data = parseMarkdown(text);
                    if (!data) return;

                    // Vergul bilan yozilgan koordinatalarni nuqtaga o'girish (Masalan: 41,55 -> 41.55)
                    const lat = parseFloat(data.lat.replace(',', '.'));
                    const lng = parseFloat(data.lng.replace(',', '.'));

                    if (!isNaN(lat) && !isNaN(lng)) {
                        // Agar turi diller bo'lsa ko'k, moyka bo'lsa qizil yoki standart marker qo'yish
                        const marker = L.marker([lat, lng]).addTo(map);
                        
                        // Marker bosilganda chiroyli ma'lumotlar oynasini chiqarish
                        const popupText = `
                            <div class="popup-content">
                                <h3>${data.title || file.replace('.md', '')}</h3>
                                <p><b>Turi:</b> ${data.type || 'Noma\'lum'}</p>
                                <p><b>Manzil:</b> ${data.address || 'Kiritilmagan'}</p>
                                <p><b>Telefon:</b> ${data.phone || 'Kiritilmagan'}</p>
                            </div>
                        `;
                        marker.bindPopup(popupText);
                    }
                })
                .catch(err => console.error("Xatolik yuz berdi:", err));
        });
    </script>
</body>
</html>
