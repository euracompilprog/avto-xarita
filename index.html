<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eura Compil - Hamkorlar Xaritasi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; }
        .popup-content h3 { margin: 0 0 10px 0; color: #2c3e50; font-family: Arial, sans-serif; }
        .popup-content p { margin: 5px 0; font-size: 13px; font-family: Arial, sans-serif; color: #34495e; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([41.0000, 68.0000], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // AGAR OBSIDIAN-DA YANGI FAYL OCHSANGIZ, NOMINI SHU YERGA QO'SHIB QO'YASIZ:
        const obsidianFiles = [
            'NAMANGAN MASHAD MOYKA.md',
            'QASHQADARYO DILLER.md',
            'TOSHKENT 7030.md',
            'XORAZM DILLER.md'
        ];

        function parseMarkdown(text) {
            const yamlRegex = /^---\r?\n([\s\S]*?)\r?\n---/;
            const match = text.match(yamlRegex);
            if (!match) return null;

            const lines = match[1].split('\n');
            const result = {};
            lines.forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    result[parts[0].trim()] = parts.slice(1).join(':').trim();
                }
            });
            return result;
        }

        obsidianFiles.forEach(file => {
            fetch(file)
                .then(res => {
                    if (!res.ok) throw new Error("Topilmadi: " + file);
                    return res.text();
                })
                .then(text => {
                    const data = parseMarkdown(text);
                    if (!data) return;

                    // Koordinatadagi xatoliklarni to'g'rilash (vergul bo'lsa nuqtaga o'giradi)
                    const lat = parseFloat(data.lat.replace(',', '.'));
                    const lng = parseFloat(data.lng.replace(',', '.'));

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const marker = L.marker([lat, lng]).addTo(map);
                        
                        const popupText = `
                            <div class="popup-content">
                                <h3>${file.replace('.md', '')}</h3>
                                <p><b>Turi:</b> ${data.type || 'Kiritilmagan'}</p>
                                <p><b>Manzil:</b> ${data.address || 'Kiritilmagan'}</p>
                                <p><b>Telefon:</b> ${data.phone || 'Kiritilmagan'}</p>
                            </div>
                        `;
                        marker.bindPopup(popupText);
                    }
                })
                .catch(err => console.log(err));
        });
    </script>
</body>
</html>
